<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>
<link rel="stylesheet" href="signup.css">
</head>
<body>
	<div class="form-container">
		<h2>Registration Form</h2>
		<form action="SignUp" method="get">
			<div class="textbox">
				<label for="firstName">First Name:</label> <input type="text"
					id="firstName" name="firstName" required>
			</div>

			<div class="textbox">
				<label for="lastName">Last Name:</label> <input type="text"
					id="lastName" name="lastName" required>
			</div>

			<div class="textbox">
				<label for="email">Email:</label> <input type="email" id="email"
					name="email" required>
			</div>

			<div class="textbox">
				<label for="password">Password:</label> <input type="password"
					id="password" name="password" required>
			</div>

			<div class="gender">
				<label>Gender:</label> <label for="male"> <input
					type="radio" id="male" name="gender" value="male" required>
					Male
				</label> <label for="female"> <input type="radio" id="female"
					name="gender" value="female" required> Female
				</label> <label for="other"> <input type="radio" id="other"
					name="gender" value="other" required> Other
				</label>
			</div>

			<div class="submit-btn">
				<button type="submit">Register</button>
				<br><br>
				<button onclick="window.location.href = 'Login';">Already have an account? Login</button>
			</div>
		</form>
	</div>
</body>
</html>
