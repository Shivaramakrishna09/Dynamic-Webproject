<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Education Details Form</title>
    <link rel="stylesheet" href="education.css">
</head>
<body>
    <div class="form-container">
        <h2>Education Details</h2>
        <form action="DashBoard" method="get">
  
            <label for="qualification">Highest Qualification:</label>
            <select id="qualification" name="qualification" required>
                <option value="" disabled selected>Select your qualification</option>
                <option value="High School">High School</option>
                <option value="Undergraduate">Undergraduate</option>
                <option value="Postgraduate">Postgraduate</option>
                <option value="Doctorate">Doctorate</option>
            </select>

            
            <label for="passoutYear">Passout Year:</label>
            <input type="number" id="passoutYear" name="passoutYear" min="1900" max="2100" required>

           
            <label for="percentage">Percentage:</label>
            <input type="number" id="percentage" name="percentage" step="0.01" min="0" max="100" required>

          
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
